<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages Jaunes Impro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1 class="site-title">Pages Jaunes Impro</h1>
  </header>

  <!-- JOURS EN HAUT -->
  <nav class="days-nav">
    <button class="day-btn" data-day="lundi" onclick="selectDay('lundi')">Lundi</button>
    <button class="day-btn" data-day="mardi" onclick="selectDay('mardi')">Mardi</button>
    <button class="day-btn" data-day="mercredi" onclick="selectDay('mercredi')">Mercredi</button>
    <button class="day-btn" data-day="jeudi" onclick="selectDay('jeudi')">Jeudi</button>
    <button class="day-btn" data-day="vendredi" onclick="selectDay('vendredi')">Vendredi</button>
    <button class="day-btn" data-day="samedi" onclick="selectDay('samedi')">Samedi</button>
    <button class="day-btn" data-day="dimanche" onclick="selectDay('dimanche')">Dimanche</button>
  </nav>
<div id="filters">
  <select id="filter-type">
    <option value="">Type : Tous</option>
  </select>

  <select id="filter-ville">
    <option value="">Ville : Toutes</option>
  </select>
</div>

  <!-- ÉVÉNEMENTS -->
  <main>
    <div id="events" class="event-grid"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
