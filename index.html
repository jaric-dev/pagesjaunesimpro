<!-- FILTRES DESKTOP -->
<div id="filters">
  <select id="filter-type"></select>
  <select id="filter-ville"></select>
  <select id="filter-hs">
    <option value="">Hors saison : Tous</option>
    <option value="hide">Cacher les hors saison</option>
    <option value="only">Afficher seulement hors saison</option>
  </select>
</div>

<!-- ACCORDÉON MOBILE -->
<div class="accordion-wrapper">
  <div class="accordion-header" id="filters-toggle">
    Filtres
    <span class="arrow">▶</span>
  </div>

  <div class="accordion-content" id="filters-content">
    <div id="filters-mobile">
      <select id="filter-type"></select>
      <select id="filter-ville"></select>
      <select id="filter-hs">
        <option value="">Hors saison : Tous</option>
        <option value="hide">Cacher les hors saison</option>
        <option value="only">Afficher seulement hors saison</option>
      </select>
    </div>
  </div>
</div>
